<svg width="100%" viewBox="0 0 680 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg-purple { fill: #3C3489; stroke: #AFA9EC; }
      .bg-teal   { fill: #085041; stroke: #5DCAA5; }
      .bg-coral  { fill: #712B13; stroke: #F0997B; }
      .bg-amber  { fill: #633806; stroke: #EF9F27; }
      .bg-green  { fill: #27500A; stroke: #97C459; }
      .bg-gray   { fill: #444441; stroke: #B4B2A9; }
      .bg-red    { fill: #791F1F; stroke: #F09595; }
      .t-light   { fill: #D3D1C7; font-family: sans-serif; font-size: 14px; font-weight: 500; }
      .t-sub     { fill: #B4B2A9; font-family: sans-serif; font-size: 12px; }
      .arr       { stroke: #888780; stroke-width: 1.2; fill: none; }
      .arr-dash  { stroke: #888780; stroke-width: 1; fill: none; stroke-dasharray: 4 3; }
      rect       { stroke-width: 0.5; }
    </style>
  </defs>

  <rect width="680" height="600" fill="#1e1e1c" rx="12"/>

  <!-- PASO 1: Cliente -->
  <rect class="bg-gray" x="215" y="20" width="250" height="52" rx="8"/>
  <text class="t-light" x="340" y="41" text-anchor="middle" dominant-baseline="central">Cliente</text>
  <text class="t-sub"   x="340" y="59" text-anchor="middle" dominant-baseline="central">POST /api/ventas + JWT</text>

  <line x1="340" y1="72" x2="340" y2="112" class="arr" marker-end="url(#arrow)"/>

  <!-- PASO 2: Gateway valida JWT -->
  <rect class="bg-purple" x="215" y="112" width="250" height="52" rx="8"/>
  <text class="t-light" x="340" y="133" text-anchor="middle" dominant-baseline="central">Gateway valida JWT</text>
  <text class="t-sub"   x="340" y="151" text-anchor="middle" dominant-baseline="central">Middleware auth:api</text>

  <!-- Bifurcación inválido -->
  <path d="M465 138 L558 138" class="arr-dash" marker-end="url(#arrow)"/>
  <rect class="bg-red" x="558" y="114" width="96" height="48" rx="8"/>
  <text class="t-light" x="606" y="133" text-anchor="middle" dominant-baseline="central">401</text>
  <text class="t-sub"   x="606" y="151" text-anchor="middle" dominant-baseline="central">No autorizado</text>
  <text class="t-sub"   x="513" y="128" text-anchor="middle">Inválido</text>

  <line x1="340" y1="164" x2="340" y2="204" class="arr" marker-end="url(#arrow)"/>
  <text class="t-sub" x="356" y="186" dominant-baseline="central">Válido</text>

  <!-- PASO 3: Consulta producto -->
  <rect class="bg-teal" x="215" y="204" width="250" height="52" rx="8"/>
  <text class="t-light" x="340" y="225" text-anchor="middle" dominant-baseline="central">Consulta microservicio</text>
  <text class="t-sub"   x="340" y="243" text-anchor="middle" dominant-baseline="central">GET /productos/{id} + Token</text>

  <!-- Bifurcación producto no existe -->
  <path d="M465 230 L558 230" class="arr-dash" marker-end="url(#arrow)"/>
  <rect class="bg-red" x="558" y="206" width="96" height="48" rx="8"/>
  <text class="t-light" x="606" y="225" text-anchor="middle" dominant-baseline="central">404</text>
  <text class="t-sub"   x="606" y="243" text-anchor="middle" dominant-baseline="central">No encontrado</text>
  <text class="t-sub"   x="513" y="220" text-anchor="middle">Sin stock</text>

  <line x1="340" y1="256" x2="340" y2="296" class="arr" marker-end="url(#arrow)"/>
  <text class="t-sub" x="356" y="278" dominant-baseline="central">Existe</text>

  <!-- PASO 4: Registra venta -->
  <rect class="bg-coral" x="215" y="296" width="250" height="52" rx="8"/>
  <text class="t-light" x="340" y="317" text-anchor="middle" dominant-baseline="central">Registra venta</text>
  <text class="t-sub"   x="340" y="335" text-anchor="middle" dominant-baseline="central">POST /ventas + Token interno</text>

  <line x1="340" y1="348" x2="340" y2="388" class="arr" marker-end="url(#arrow)"/>

  <!-- PASO 5: Guarda en MongoDB -->
  <rect class="bg-green" x="215" y="388" width="250" height="52" rx="8"/>
  <text class="t-light" x="340" y="409" text-anchor="middle" dominant-baseline="central">Guarda en MongoDB</text>
  <text class="t-sub"   x="340" y="427" text-anchor="middle" dominant-baseline="central">Documento de venta creado</text>

  <line x1="340" y1="440" x2="340" y2="480" class="arr" marker-end="url(#arrow)"/>

  <!-- PASO 6: Respuesta -->
  <rect class="bg-amber" x="215" y="480" width="250" height="52" rx="8"/>
  <text class="t-light" x="340" y="501" text-anchor="middle" dominant-baseline="central">Respuesta al cliente</text>
  <text class="t-sub"   x="340" y="519" text-anchor="middle" dominant-baseline="central">201 · { _id, total, estado }</text>

  <!-- Números de pasos -->
  <circle class="bg-gray"   cx="196" cy="46"  r="11" stroke-width="0.5"/>
  <text class="t-sub" x="196" y="46"  text-anchor="middle" dominant-baseline="central">1</text>
  <circle class="bg-purple" cx="196" cy="138" r="11" stroke-width="0.5"/>
  <text class="t-sub" x="196" y="138" text-anchor="middle" dominant-baseline="central">2</text>
  <circle class="bg-teal"   cx="196" cy="230" r="11" stroke-width="0.5"/>
  <text class="t-sub" x="196" y="230" text-anchor="middle" dominant-baseline="central">3</text>
  <circle class="bg-coral"  cx="196" cy="322" r="11" stroke-width="0.5"/>
  <text class="t-sub" x="196" y="322" text-anchor="middle" dominant-baseline="central">4</text>
  <circle class="bg-green"  cx="196" cy="414" r="11" stroke-width="0.5"/>
  <text class="t-sub" x="196" y="414" text-anchor="middle" dominant-baseline="central">5</text>
  <circle class="bg-amber"  cx="196" cy="506" r="11" stroke-width="0.5"/>
  <text class="t-sub" x="196" y="506" text-anchor="middle" dominant-baseline="central">6</text>
</svg>
